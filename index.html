<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chunar Mart</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E7A34">
</head>
<body style="font-family:Arial;text-align:center;padding:40px;background:#f7f7f7;">

<h1 style="color:#1E7A34;">Chunar Mart</h1>
<h2>Fresh Grocery Delivered</h2>
<p>Install app for faster shopping</p>

<button id="installBtn" style="display:none;padding:14px 24px;background:#1E7A34;color:#fff;border:none;border-radius:10px;">
📲 Install App
</button>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
document.getElementById('installBtn').style.display='inline-block';
});

document.getElementById('installBtn').onclick = async () => {
if(deferredPrompt){
deferredPrompt.prompt();
deferredPrompt=null;
}
}
</script>

</body>
</html>
